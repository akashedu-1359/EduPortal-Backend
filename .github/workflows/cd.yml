name: CD

on:
  push:
    branches: [develop, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/eduportal-backend

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: EduPortal.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to OCI VM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Determine image tag from branch
            BRANCH="${{ github.ref_name }}"
            IMAGE="${{ env.IMAGE_NAME }}:${BRANCH}"

            # Create app directory
            mkdir -p ~/eduportal-backend
            cd ~/eduportal-backend

            # Write .env file from secrets
            cat > .env << 'ENVEOF'
            ASPNETCORE_ENVIRONMENT=${{ github.ref_name == 'main' && 'Production' || 'Development' }}
            ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}
            JwtSettings__Secret=${{ secrets.JWT_SECRET }}
            JwtSettings__Issuer=${{ secrets.JWT_ISSUER }}
            JwtSettings__Audience=${{ secrets.JWT_AUDIENCE }}
            Redis__ConnectionString=${{ secrets.REDIS_CONNECTION_STRING }}
            Storage__AccountId=${{ secrets.R2_ACCOUNT_ID }}
            Storage__BucketName=${{ secrets.R2_BUCKET_NAME }}
            Storage__AccessKeyId=${{ secrets.R2_ACCESS_KEY_ID }}
            Storage__SecretAccessKey=${{ secrets.R2_SECRET_ACCESS_KEY }}
            Email__ResendApiKey=${{ secrets.RESEND_API_KEY }}
            Email__FromAddress=${{ secrets.EMAIL_FROM_ADDRESS }}
            Google__ClientId=${{ secrets.GOOGLE_CLIENT_ID }}
            Google__ClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }}
            Payment__Stripe__SecretKey=${{ secrets.STRIPE_SECRET_KEY }}
            Payment__Stripe__WebhookSecret=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            Payment__Razorpay__KeyId=${{ secrets.RAZORPAY_KEY_ID }}
            Payment__Razorpay__KeySecret=${{ secrets.RAZORPAY_KEY_SECRET }}
            Cors__AllowedOrigins__0=${{ secrets.FRONTEND_URL }}
            NextJs__RevalidateUrl=${{ secrets.NEXTJS_REVALIDATE_URL }}
            NextJs__RevalidateSecret=${{ secrets.REVALIDATION_SECRET }}
            ENVEOF

            # Write docker-compose for this deployment
            cat > docker-compose.yml << EOF
            version: '3.8'
            services:
              api:
                image: ${IMAGE}
                restart: unless-stopped
                ports:
                  - "8080:8080"
                env_file:
                  - .env
                depends_on:
                  - postgres
                  - redis

              postgres:
                image: postgres:16-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_DB: eduportal
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: \${{ secrets.POSTGRES_PASSWORD }}
                volumes:
                  - postgres_data:/var/lib/postgresql/data

              redis:
                image: redis:7-alpine
                restart: unless-stopped

            volumes:
              postgres_data:
            EOF

            # Log in to GHCR on the VM
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image and restart
            docker compose pull api
            docker compose up -d

            # Clean up old images
            docker image prune -f

            echo "Deployed ${IMAGE} successfully"
