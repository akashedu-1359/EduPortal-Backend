name: CD — Backend

on:
  push:
    branches: [main]

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

env:
  REGION: ${{ vars.GCP_REGION }}
  IMAGE: ${{ vars.AR_BASE }}/backend

jobs:
  # ── Build & Push ────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: EduPortal.API/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: eduportal-backend
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}
          service_account: ${{ vars.RUNTIME_SA }}
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --concurrency=80
            --timeout=60
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Production
          secrets: |
            ConnectionStrings__DefaultConnection=db-connection-string:latest
            JwtSettings__Secret=jwt-secret:latest
            JwtSettings__Issuer=jwt-issuer:latest
            JwtSettings__Audience=jwt-audience:latest
            Redis__ConnectionString=redis-connection-string:latest
            Storage__AccountId=r2-account-id:latest
            Storage__BucketName=r2-bucket-name:latest
            Storage__AccessKeyId=r2-access-key-id:latest
            Storage__SecretAccessKey=r2-secret-access-key:latest
            Email__ResendApiKey=resend-api-key:latest
            Email__FromAddress=email-from-address:latest
            Google__ClientId=google-client-id:latest
            Google__ClientSecret=google-client-secret:latest
            Payment__Stripe__SecretKey=stripe-secret-key:latest
            Payment__Stripe__WebhookSecret=stripe-webhook-secret:latest
            Payment__Razorpay__KeyId=razorpay-key-id:latest
            Payment__Razorpay__KeySecret=razorpay-key-secret:latest
            Cors__AllowedOrigins__0=frontend-url:latest
            NextJs__RevalidateUrl=nextjs-revalidate-url:latest
            NextJs__RevalidateSecret=revalidation-secret:latest

      - name: Summary
        if: always()
        run: |
          echo "### Backend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image  | \`${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL    | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
